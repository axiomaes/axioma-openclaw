version: '3.8'

services:
  agent:
    build: .
    container_name: axioma-agent
    restart: always
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - AXIOMA_API_URL=${AXIOMA_API_URL}
      - CONTROL_PLANE_TOKEN=${CONTROL_PLANE_TOKEN}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - LINKEDIN_PERSON_ID=${LINKEDIN_PERSON_ID}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_BUSINESS_ACCOUNT_ID=${INSTAGRAM_BUSINESS_ACCOUNT_ID}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID}
      - MAILCOW_IMAP_HOST=${MAILCOW_IMAP_HOST}
      - MAILCOW_IMAP_PORT=${MAILCOW_IMAP_PORT}
      - MAILCOW_SMTP_HOST=${MAILCOW_SMTP_HOST}
      - MAILCOW_SMTP_PORT=${MAILCOW_SMTP_PORT}
      - MAILCOW_USER=${MAILCOW_USER}
      - MAILCOW_PASS=${MAILCOW_PASS}
    networks:
      - axioma-network
    volumes:
      - axioma-scout-state:/app/data

networks:
  axioma-network:
    external: true

volumes:
  axioma-scout-state:
