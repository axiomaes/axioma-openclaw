version: '3.8'

services:
  openclaw:
    build: .
    container_name: axioma-openclaw
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/root/.openclaw/workspace
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - CLOUDFLARE_AI_ENDPOINT=${CLOUDFLARE_AI_ENDPOINT}
      - CLOUDFLARE_AUTH_TOKEN=${CLOUDFLARE_AUTH_TOKEN}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${POSTGRES_URL}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - MAILCOW_IMAP_HOST=${MAILCOW_IMAP_HOST}
      - MAILCOW_IMAP_PORT=${MAILCOW_IMAP_PORT}
      - MAILCOW_SMTP_HOST=${MAILCOW_SMTP_HOST}
      - MAILCOW_SMTP_PORT=${MAILCOW_SMTP_PORT}
      - MAILCOW_USER=${MAILCOW_USER}
      - MAILCOW_PASS=${MAILCOW_PASS}
    networks:
      - axioma-network

networks:
  axioma-network:
    external: true
